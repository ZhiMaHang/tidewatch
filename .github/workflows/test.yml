# 单元测试。release.yml 只在打 tag 时触发且只出包,测试写了没人守等于没写,
# 所以这里单独在每次 push / PR 上跑。
name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache .build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: swift test
        run: swift test
